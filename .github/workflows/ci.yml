name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install g++-14
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Compile tests
        run: make build/test_compile

      - name: Compile benchmark
        run: make build/benchmark_fair

      - name: Run tests
        run: ./build/test_compile

      - name: Run regression check
        run: |
          if [ -f ./build/test_replacement ]; then
            ./build/test_replacement
          else
            echo "test_replacement binary not found, skipping regression check"
          fi
