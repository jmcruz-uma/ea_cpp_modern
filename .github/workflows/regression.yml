name: ZDT1 Regression Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zdt1-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++-14
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Run ZDT1 regression test
        run: bash tests/regression/test_zdt1_regression.sh
